<rect x="440" y="560" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="540" y="580" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Resource advisor</text>
<text x="540" y="598" text-anchor="middle" font-size="11" fill="#993C1D">Allocation analysis</text>

