<svg width="680" height="920" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#ffffff;font-family:Arial,sans-serif;">
<title>Mira Architecture Diagram</title>
<desc>Flowchart showing the Mira AI workflow from chat trigger through data loading, JavaScript processing, intent classification, routing, six specialist agents, and Langfuse observability.</desc>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Chat Trigger -->
<rect x="240" y="20" width="200" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="46" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Chat trigger</text>

<!-- Arrow down to data layer -->
<line x1="340" y1="64" x2="340" y2="94" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Google Drive label -->
<text x="30" y="96" font-size="11" fill="#888780">Google Drive reads</text>

