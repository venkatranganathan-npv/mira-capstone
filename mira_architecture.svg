<text x="85" y="134" text-anchor="middle" font-size="11" fill="#0F6E56">Google Drive</text>

<rect x="165" y="100" width="130" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
